services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_campaign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d email_campaign"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://postgres:postgres@db:5432/email_campaign
      TEST_DATABASE_URL: postgres://postgres:postgres@db:5432/email_campaign_test
      # Min 16 chars (see src/config/env.ts); override in production
      JWT_SECRET: docker_dev_jwt_secret_min_16_chars
      AUTH_CRYPTO_KEY: change_me_auth_crypto_secret
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
